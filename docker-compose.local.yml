services:
  postgres:
    image: postgres:16-alpine
    container_name: elizaveta_bot_postgres
    environment:
      POSTGRES_DB: elizaveta_bot
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d elizaveta_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  nocodb:
    image: nocodb/nocodb:latest
    container_name: elizaveta_bot_nocodb
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NC_DB: "pg://postgres:5432?u=bot&p=bot_password&d=elizaveta_bot"
    ports:
      - "8080:8080"
    volumes:
      - nocodb_data:/usr/app/data

volumes:
  postgres_data:
  nocodb_data:
